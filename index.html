<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Quest — Task Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">

    <style>
        /* ─── THEME VARS ─────────────────────────────────── */
        :root {
            --bg-a: #020617;
            --bg-b: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.8);
            --glass: rgba(30, 41, 59, 0.55);
            --glass2: rgba(51, 65, 85, 0.55);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #22d3ee;
            --accent2: #6366f1;
            --accent3: #22c55e;
            --coin: #fbbf24;
            --text: #e2e8f0;
            --muted: #64748b;
            --danger: #f43f5e;
            --radius: 20px;
            --blur: blur(18px);
            --done-bg: rgba(34, 197, 94, 0.06);
            --done-border: rgba(34, 197, 94, 0.18);
        }

        .theme-void {
            --bg-a: #020617;
            --bg-b: #0f172a;
            --accent: #22d3ee;
            --accent2: #6366f1;
            --accent3: #22c55e;
        }

        .theme-synthwave {
            --bg-a: #16001e;
            --bg-b: #2d0036;
            --accent: #f000ff;
            --accent2: #ff6ef7;
            --accent3: #ff4eb8;
        }

        .theme-ember {
            --bg-a: #0d0500;
            --bg-b: #1a0a00;
            --accent: #ff6a00;
            --accent2: #ee0979;
            --accent3: #ffb400;
        }

        .theme-aurora {
            --bg-a: #001a1a;
            --bg-b: #002233;
            --accent: #00ffc8;
            --accent2: #0099ff;
            --accent3: #7fff00;
        }

        .theme-gold {
            --bg-a: #0d0a00;
            --bg-b: #1a1400;
            --accent: #ffd700;
            --accent2: #ff8c00;
            --accent3: #ffec80;
        }

        /* ─── RESET ──────────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, .18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(34, 211, 238, .12) 0%, transparent 60%),
                linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background .6s;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: .4;
        }

        /* ─── HEADER ─────────────────────────────────────── */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px 10px;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 900;
            letter-spacing: .05em;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowPulse 3s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 30%, transparent));
            }

            to {
                filter: drop-shadow(0 0 28px color-mix(in srgb, var(--accent) 60%, transparent));
            }
        }

        .header .subtitle {
            font-size: .9rem;
            color: var(--muted);
            margin-top: 6px;
            letter-spacing: .08em;
        }

        /* ─── HUD ────────────────────────────────────────── */
        .hud {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 28px auto;
            max-width: 760px;
            padding: 0 20px;
        }

        .hud-ring-wrap {
            position: relative;
            width: 110px;
            height: 110px;
            flex-shrink: 0;
        }

        .hud-ring-wrap svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, .06);
            stroke-width: 9;
        }

        .ring-fill {
            fill: none;
            stroke: var(--accent);
            stroke-width: 9;
            stroke-linecap: round;
            stroke-dasharray: 289;
            stroke-dashoffset: 289;
            transition: stroke-dashoffset .6s cubic-bezier(.4, 0, .2, 1), stroke .4s;
            filter: drop-shadow(0 0 6px var(--accent));
        }

        .ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: .7rem;
            color: var(--muted);
            gap: 2px;
        }

        .ring-level {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .hud-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 380px;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: var(--blur);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: .88rem;
            min-width: 176px;
            flex: 1;
        }

        .stat-pill .ico {
            font-size: 1.1rem;
        }

        .stat-pill .val {
            font-weight: 600;
            color: var(--accent);
            margin-left: auto;
            font-family: 'Orbitron', monospace;
            font-size: .78rem;
        }

        /* ─── ACHIEVEMENTS ───────────────────────────────── */
        .achievements {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto 24px;
            padding: 0 20px;
        }

        .badge {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 5px 14px;
            font-size: .78rem;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: var(--blur);
            opacity: .35;
            transition: opacity .3s, border-color .3s, box-shadow .3s;
        }

        .badge.earned {
            opacity: 1;
            border-color: color-mix(in srgb, var(--coin) 60%, transparent);
            box-shadow: 0 0 10px color-mix(in srgb, var(--coin) 25%, transparent);
        }

        /* ─── TOOLBAR ────────────────────────────────────── */
        .toolbar {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto 32px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .search-wrap {
            flex: 1;
            min-width: 200px;
            max-width: 460px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 13px 20px 13px 46px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            color: var(--text);
            font-size: .95rem;
            outline: none;
            transition: border-color .3s, box-shadow .3s;
        }

        .search-wrap input::placeholder {
            color: var(--muted);
        }

        .search-wrap input:focus {
            border-color: color-mix(in srgb, var(--accent) 50%, transparent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .btn-shop {
            padding: 12px 22px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            color: var(--text);
            font-size: .9rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background .2s, border-color .2s, transform .15s;
        }

        .btn-shop:hover {
            background: var(--glass2);
            border-color: color-mix(in srgb, var(--accent) 40%, transparent);
            transform: translateY(-1px);
        }

        /* ─── SECTION WRAP ───────────────────────────────── */
        .section-wrap {
            position: relative;
            z-index: 5;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .section-spacer {
            height: 32px;
        }

        /* ─── SECTION HEADER (collapsible) ──────────────── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 20px;
            margin-bottom: 18px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            user-select: none;
            backdrop-filter: var(--blur);
            transition: background .2s, border-color .25s;
            animation: fadeUp .4s ease both;
        }

        .section-header:hover {
            background: var(--glass2);
            border-color: color-mix(in srgb, var(--accent) 25%, transparent);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .sec-pill {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .sec-pill-active {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .sec-pill-done {
            background: var(--accent3);
            box-shadow: 0 0 8px var(--accent3);
        }

        .sec-title {
            font-family: 'Orbitron', monospace;
            font-size: .92rem;
            font-weight: 700;
            letter-spacing: .04em;
            flex: 1;
        }

        .sec-count {
            font-size: .78rem;
            color: var(--muted);
            background: rgba(255, 255, 255, .06);
            border-radius: 999px;
            padding: 3px 12px;
            font-family: 'Orbitron', monospace;
        }

        .sec-chevron {
            color: var(--muted);
            font-size: .9rem;
            transition: transform .35s cubic-bezier(.4, 0, .2, 1);
        }

        .section-header.collapsed .sec-chevron {
            transform: rotate(-90deg);
        }

        /* ─── SECTION BODY ───────────────────────────────── */
        .section-body {
            overflow: hidden;
            transition: max-height .45s cubic-bezier(.4, 0, .2, 1), opacity .35s;
            max-height: 9999px;
            opacity: 1;
        }

        .section-body.collapsed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 22px;
            padding: 2px 2px 8px;
        }

        /* ─── CARD ───────────────────────────────────────── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: var(--blur);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
            transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), box-shadow .35s, border-color .3s;
            animation: cardIn .5s ease both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.013);
            box-shadow: 0 28px 72px rgba(0, 0, 0, .65), 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
        }

        .card.card-done {
            border-color: var(--done-border);
        }

        .card.card-done:hover {
            box-shadow: 0 28px 72px rgba(0, 0, 0, .5), 0 0 0 1px color-mix(in srgb, var(--accent3) 28%, transparent);
        }

        /* thumbnail */
        .thumb-wrap {
            position: relative;
            width: 100%;
            height: 198px;
            overflow: hidden;
            cursor: pointer;
        }

        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s;
        }

        .card:hover .thumb-wrap img {
            transform: scale(1.06);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .36);
            transition: background .3s;
        }

        .card:hover .play-overlay {
            background: rgba(0, 0, 0, .2);
        }

        .play-btn {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, .92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .45);
            transition: transform .2s;
        }

        .play-btn svg {
            width: 18px;
            fill: var(--bg-a);
            margin-left: 3px;
        }

        .thumb-wrap:hover .play-btn {
            transform: scale(1.12);
        }

        .done-overlay-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(34, 197, 94, .88);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: .72rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(6px);
        }

        .thumb-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, .1);
        }

        .thumb-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .5s;
        }

        .card iframe {
            width: 100%;
            height: 210px;
            border: none;
            display: block;
        }

        /* card body */
        .card-body {
            padding: 18px;
        }

        .vid-title {
            font-size: .94rem;
            font-weight: 600;
            line-height: 1.38;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .vid-title.shimmer {
            height: 16px;
            width: 78%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--glass) 25%, var(--glass2) 50%, var(--glass) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .vid-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            margin-top: 4px;
        }

        .vid-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            flex-shrink: 0;
        }

        .vid-id {
            font-size: .72rem;
            color: var(--muted);
            font-family: 'Orbitron', monospace;
            letter-spacing: .04em;
        }

        .all-done-chip {
            margin-left: auto;
            background: rgba(34, 197, 94, .12);
            color: #4ade80;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: .7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ─── TASK ACCORDION ─────────────────────────────── */
        .acc-section {
            margin-bottom: 6px;
        }

        .acc-hdr {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: background .2s;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .03em;
        }

        .acc-hdr:hover {
            background: rgba(255, 255, 255, .04);
        }

        .acc-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .acc-dot-pending {
            background: var(--accent);
        }

        .acc-dot-done {
            background: var(--accent3);
        }

        .acc-label {
            flex: 1;
        }

        .acc-count {
            font-size: .72rem;
            font-family: 'Orbitron', monospace;
            background: rgba(255, 255, 255, .07);
            border-radius: 999px;
            padding: 2px 9px;
        }

        .acc-arrow {
            font-size: .75rem;
            color: var(--muted);
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
        }

        .acc-hdr.closed .acc-arrow {
            transform: rotate(-90deg);
        }

        .acc-body {
            overflow: hidden;
            max-height: 3000px;
            transition: max-height .4s cubic-bezier(.4, 0, .2, 1), opacity .3s;
            opacity: 1;
        }

        .acc-body.closed {
            max-height: 0 !important;
            opacity: 0;
        }

        /* ─── TASK ITEM ──────────────────────────────────── */
        .task {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            margin: 5px 0;
            cursor: pointer;
            transition: background .2s, border-color .2s, transform .18s;
            overflow: hidden;
        }

        .task::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 3px 0 0 3px;
            background: var(--accent);
            transition: background .3s;
        }

        .task:hover {
            background: var(--glass2);
            border-color: color-mix(in srgb, var(--accent) 30%, transparent);
            transform: translateX(4px);
        }

        .task.done {
            background: var(--done-bg);
            border-color: var(--done-border);
            cursor: default;
        }

        .task.done::before {
            background: var(--accent3);
        }

        .task.done:hover {
            transform: none;
            background: var(--done-bg);
        }

        .task-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .task-circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            transition: border-color .2s, background .2s;
            font-size: .65rem;
            color: transparent;
        }

        .task.done .task-circle {
            background: var(--accent3);
            border-color: var(--accent3);
            color: #fff;
        }

        .task:not(.done):hover .task-circle {
            border-color: var(--accent);
        }

        .task-name {
            font-weight: 600;
            font-size: .88rem;
            flex: 1;
            line-height: 1.35;
            transition: color .2s;
        }

        .task.done .task-name {
            text-decoration: line-through;
            color: var(--muted);
        }

        .task:not(.done):hover .task-name {
            color: var(--accent);
        }

        .task-meta {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 5px;
            padding-left: 28px;
        }

        .priority-tag {
            padding: 2px 9px;
            border-radius: 999px;
            font-size: .7rem;
            font-weight: 500;
        }

        .p-high {
            background: rgba(244, 63, 94, .15);
            color: #f43f5e;
        }

        .p-medium {
            background: rgba(251, 191, 36, .15);
            color: #fbbf24;
        }

        .p-low {
            background: rgba(34, 211, 238, .15);
            color: #22d3ee;
        }

        .task-desc {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 5px;
            padding-left: 28px;
            line-height: 1.5;
        }

        .watch-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            color: var(--accent);
            font-size: .82rem;
            text-decoration: none;
            transition: gap .2s;
        }

        .watch-link:hover {
            gap: 10px;
            text-decoration: underline;
        }

        /* ─── EMPTY STATE ────────────────────────────────── */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
        }

        .empty-state .ei {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        /* ─── SHOP MODAL ─────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, .75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: linear-gradient(145deg, rgba(15, 23, 42, .97), rgba(30, 41, 59, .97));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px;
            width: min(560px, 94vw);
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 100px rgba(0, 0, 0, .8);
            transform: translateY(20px);
            transition: transform .3s;
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .modal-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--glass2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }

        .modal-close:hover {
            background: rgba(244, 63, 94, .2);
            color: #f43f5e;
        }

        .modal-coins {
            text-align: center;
            margin-bottom: 28px;
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--coin);
        }

        .shop-sec {
            margin-bottom: 28px;
        }

        .shop-sec-title {
            font-size: .8rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shop-sec-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
            gap: 10px;
        }

        .theme-card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .25s, transform .2s, box-shadow .2s;
            aspect-ratio: 1;
        }

        .theme-card:hover {
            transform: scale(1.05);
        }

        .theme-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 40%, transparent);
        }

        .theme-card .swatch {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px;
            font-size: .78rem;
            font-weight: 600;
            text-align: center;
        }

        .theme-card .cost {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, .6);
            border-radius: 999px;
            padding: 2px 7px;
            font-size: .68rem;
            color: var(--coin);
        }

        .theme-card .owned-badge {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(34, 197, 94, .2);
            color: #22c55e;
            border-radius: 999px;
            padding: 2px 7px;
            font-size: .68rem;
        }

        .powerup-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .powerup-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            cursor: pointer;
            transition: background .2s, border-color .2s, transform .15s;
        }

        .powerup-item:hover {
            background: var(--glass2);
            border-color: color-mix(in srgb, var(--accent) 30%, transparent);
            transform: translateX(4px);
        }

        .powerup-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .powerup-info {
            flex: 1;
        }

        .powerup-name {
            font-weight: 600;
            font-size: .9rem;
            margin-bottom: 2px;
        }

        .powerup-desc {
            font-size: .75rem;
            color: var(--muted);
        }

        .powerup-cost {
            font-family: 'Orbitron', monospace;
            font-size: .8rem;
            color: var(--coin);
            font-weight: 700;
            white-space: nowrap;
        }

        /* ─── TOAST ──────────────────────────────────────── */
        #toast-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(135deg, rgba(30, 41, 59, .97), rgba(15, 23, 42, .97));
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 20px;
            font-size: .88rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .6);
            pointer-events: none;
            animation: toastIn .35s cubic-bezier(.34, 1.56, .64, 1) both, toastOut .35s 2.8s ease forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(30px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(30px)
            }
        }

        /* ─── LEVEL-UP ────────────────────────────────────── */
        .lvl-banner {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .8);
            backdrop-filter: blur(12px);
            animation: fadeIn .3s ease both, fadeOut .5s 2.3s ease both;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0
            }
        }

        .lvl-inner {
            text-align: center;
            animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes popIn {
            from {
                transform: scale(.4)
            }

            to {
                transform: scale(1)
            }
        }

        .lvl-inner h2 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--accent));
            margin-bottom: 8px;
        }

        .lvl-inner p {
            font-size: 1.1rem;
            color: var(--muted);
        }

        .stars {
            font-size: 2.5rem;
            animation: starRock 1s ease infinite alternate;
        }

        @keyframes starRock {
            from {
                transform: rotate(-15deg)
            }

            to {
                transform: rotate(15deg)
            }
        }

        /* ─── SCROLLBAR ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass2);
            border-radius: 99px;
        }

        @media(max-width:520px) {
            .section-grid {
                grid-template-columns: 1fr;
            }

            .hud {
                gap: 14px;
            }
        }
    </style>
</head>

<body class="theme-void">

    <!-- HEADER -->
    <div class="header">
        <h1>⚡ YT Quest</h1>
        <p class="subtitle">Complete tasks · Earn coins · Level up</p>
    </div>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-ring-wrap">
            <svg width="110" height="110">
                <circle class="ring-bg" cx="55" cy="55" r="46" />
                <circle class="ring-fill" id="ringFill" cx="55" cy="55" r="46" />
            </svg>
            <div class="ring-label">
                <span class="ring-level" id="ringLevel">1</span>
                <span>LEVEL</span>
            </div>
        </div>
        <div class="hud-stats">
            <div class="stat-pill"><span class="ico">🎯</span><span>Progress</span><span class="val"
                    id="statProg">0/1</span></div>
            <div class="stat-pill"><span class="ico">💰</span><span>Coins</span><span class="val"
                    id="statCoins">0</span></div>
            <div class="stat-pill"><span class="ico">🔥</span><span>Streak</span><span class="val"
                    id="statStreak">0</span></div>
            <div class="stat-pill"><span class="ico">🎬</span><span>Videos Done</span><span class="val"
                    id="statVids">0/0</span></div>
        </div>
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="achievements" id="achievements"></div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search tasks or video titles…" autocomplete="off" />
        </div>
        <button class="btn-shop" onclick="openShop()">🛒 Shop</button>
    </div>

    <!-- SECTIONS -->
    <div class="section-wrap" id="sectionWrap"></div>

    <!-- SHOP MODAL -->
    <div class="modal-overlay" id="shopModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">🛒 Quest Shop</span>
                <button class="modal-close" onclick="closeShop()">✕</button>
            </div>
            <div class="modal-coins" id="shopCoins">💰 0</div>
            <div class="shop-sec">
                <div class="shop-sec-title">🎨 Themes</div>
                <div class="theme-grid" id="themeGrid"></div>
            </div>
            <div class="shop-sec">
                <div class="shop-sec-title">⚡ Power-Ups</div>
                <div class="powerup-list" id="powerupList"></div>
            </div>
        </div>
    </div>

    <div id="toast-wrap"></div>

    <script>
        /* ══ CONSTANTS ══════════════════════════════════ */
        const THEMES = [
            { id: 'void', label: 'Void', emoji: '🌑', cost: 0, colors: ['#020617', '#22d3ee'] },
            { id: 'synthwave', label: 'Synthwave', emoji: '🌆', cost: 15, colors: ['#16001e', '#f000ff'] },
            { id: 'ember', label: 'Ember', emoji: '🔥', cost: 15, colors: ['#0d0500', '#ff6a00'] },
            { id: 'aurora', label: 'Aurora', emoji: '🌌', cost: 15, colors: ['#001a1a', '#00ffc8'] },
            { id: 'gold', label: 'Royal Gold', emoji: '👑', cost: 25, colors: ['#0d0a00', '#ffd700'] },
        ];
        const POWERUPS = [
            { id: 'double_coins', label: 'Double Coins', emoji: '💎', desc: 'Next 5 tasks give 2× coins', cost: 20, dur: 5 },
            { id: 'xp_boost', label: 'XP Boost', emoji: '⚡', desc: 'Tasks count 2× toward level', cost: 30, dur: 3 },
            { id: 'streak_shield', label: 'Streak Shield', emoji: '🛡️', desc: 'Prevent streak loss once', cost: 25, dur: 1 },
        ];
        const ACH = [
            { id: 'first', label: 'First Blood', emoji: '🗡️', req: g => objLen(g.dt) >= 1 },
            { id: 'ten', label: 'Task Hunter', emoji: '🏹', req: g => objLen(g.dt) >= 10 },
            { id: 'fifty', label: 'Grind Master', emoji: '💪', req: g => objLen(g.dt) >= 50 },
            { id: 'lv5', label: 'Level 5', emoji: '🌟', req: g => g.level >= 5 },
            { id: 'lv10', label: 'Level 10', emoji: '🏆', req: g => g.level >= 10 },
            { id: 'rich', label: 'Coin Hoarder', emoji: '💰', req: g => g.totalCoins >= 100 },
            { id: 'fire', label: 'On Fire', emoji: '🔥', req: g => g.streak >= 3 },
            { id: 'vidhero', label: 'Video Hero', emoji: '🎬', req: g => countDoneVids() >= 3 },
        ];
        const LVLS = [1, 2, 3, 5, 7, 10];
        const objLen = o => Object.keys(o).length;

        /* ══ STATE ══════════════════════════════════════ */
        let G = JSON.parse(localStorage.getItem('ytq3') || 'null') || {
            level: 1, completed: 0, coins: 0, totalCoins: 0, streak: 0, lastDate: null,
            dt: {}, ach: [], ownedThemes: ['void'], activeTheme: 'void',
            pw: null, pwLeft: 0,
        };

        let allData = [];       // [{f,d:{video_id,tasks},title}]
        let secOpen = { ip: true, done: true };    // section collapse state
        let accOpen = {};       // {vid: {pending:bool, done:bool}}
        let titleCache = {};

        function getReq(l) { return l <= LVLS.length ? LVLS[l - 1] : 10 + (l - LVLS.length) * 5; }
        function save() { localStorage.setItem('ytq3', JSON.stringify(G)); }

        /* ══ TITLE FETCH ════════════════════════════════ */
        async function fetchTitle(vid) {
            if (titleCache[vid]) return titleCache[vid];
            try {
                const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
                const j = await r.json();
                titleCache[vid] = j.title || vid;
            } catch { titleCache[vid] = vid; }
            return titleCache[vid];
        }

        /* ══ VIDEO STATUS HELPERS ═══════════════════════ */
        function isVideoDone(item) {
            const t = item.d.tasks || [];
            return t.length > 0 && t.every((_, i) => G.dt[`${item.d.video_id}_${i}`]);
        }
        function doneCount(item) {
            return (item.d.tasks || []).filter((_, i) => G.dt[`${item.d.video_id}_${i}`]).length;
        }
        function countDoneVids() { return allData.filter(i => isVideoDone(i)).length; }

        /* ══ COMPLETE TASK ══════════════════════════════ */
        function completeTask(tid, vid) {
            if (G.dt[tid]) return;
            G.dt[tid] = true;

            let coins = 2;
            if (G.pw === 'double_coins' && G.pwLeft > 0) { coins = 4; G.pwLeft--; if (!G.pwLeft) { G.pw = null; toast('💎 Double Coins expired'); } }
            G.coins += coins; G.totalCoins += coins; toast(`+${coins} 💰`);

            let xp = 1;
            if (G.pw === 'xp_boost' && G.pwLeft > 0) { xp = 2; G.pwLeft--; if (!G.pwLeft) { G.pw = null; toast('⚡ XP Boost expired'); } }
            G.completed += xp;

            updateStreak();
            checkAch();

            if (G.completed >= getReq(G.level)) {
                G.level++; G.completed = 0; G.coins += 10; G.totalCoins += 10;
                save(); showLvlUp();
            }
            save();
            updateHUD();
            render(document.getElementById('search').value.toLowerCase());
        }

        /* ══ STREAK ═════════════════════════════════════ */
        function updateStreak() {
            const today = new Date().toDateString();
            if (G.lastDate === today) return;
            const yd = new Date(); yd.setDate(yd.getDate() - 1);
            if (G.lastDate === yd.toDateString()) { G.streak++; toast(`🔥 Streak ×${G.streak}!`); }
            else {
                if (G.pw === 'streak_shield') { toast('🛡️ Streak Shield saved you!'); G.pw = null; }
                else G.streak = 1;
            }
            G.lastDate = today;
        }

        /* ══ ACHIEVEMENTS ═══════════════════════════════ */
        function checkAch() {
            ACH.forEach(a => {
                if (!G.ach.includes(a.id) && a.req(G)) {
                    G.ach.push(a.id); G.coins += 5; G.totalCoins += 5;
                    toast(`🏆 ${a.label} unlocked! (+5 💰)`);
                }
            });
            renderAch();
        }
        function renderAch() {
            document.getElementById('achievements').innerHTML =
                ACH.map(a => `<div class="badge ${G.ach.includes(a.id) ? 'earned' : ''}">${a.emoji} ${a.label}</div>`).join('');
        }

        /* ══ HUD ════════════════════════════════════════ */
        function updateHUD() {
            const req = getReq(G.level);
            const circ = 2 * Math.PI * 46;
            document.getElementById('ringFill').style.strokeDashoffset = circ - Math.min(G.completed / req, 1) * circ;
            document.getElementById('ringLevel').textContent = G.level;
            document.getElementById('statProg').textContent = `${G.completed}/${req}`;
            document.getElementById('statCoins').textContent = G.coins;
            document.getElementById('statStreak').textContent = G.streak;
            document.getElementById('statVids').textContent = `${countDoneVids()}/${allData.length}`;
            document.getElementById('shopCoins').textContent = `💰 ${G.coins} coins`;
        }

        /* ══ PLAY VIDEO ════════════════════════════════ */
        function playVideo(el, vid) {
            el.outerHTML = `<iframe width="100%" height="210" src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
        }

        /* ══ SECTION TOGGLE ═════════════════════════════ */
        function toggleSec(key) {
            secOpen[key] = !secOpen[key];
            document.getElementById(`sh-${key}`).classList.toggle('collapsed', !secOpen[key]);
            document.getElementById(`sb-${key}`).classList.toggle('collapsed', !secOpen[key]);
        }

        /* ══ TASK ACCORDION TOGGLE ══════════════════════ */
        function toggleAcc(vid, type) {
            if (!accOpen[vid]) accOpen[vid] = { pending: true, done: false };
            accOpen[vid][type] = !accOpen[vid][type];
            document.getElementById(`ah-${vid}-${type}`).classList.toggle('closed', !accOpen[vid][type]);
            document.getElementById(`ab-${vid}-${type}`).classList.toggle('closed', !accOpen[vid][type]);
        }

        /* ══ BUILD CARD ═════════════════════════════════ */
        function buildCard(item, delay) {
            const vid = item.d.video_id;
            const tasks = item.d.tasks || [];
            const done = isVideoDone(item);
            const dc = doneCount(item);
            const pct = tasks.length ? Math.round(dc / tasks.length * 100) : 0;

            if (!accOpen[vid]) accOpen[vid] = { pending: true, done: false };

            const pendingTasks = tasks.map((t, i) => ({ t, i })).filter(({ i }) => !G.dt[`${vid}_${i}`]);
            const doneTasks = tasks.map((t, i) => ({ t, i })).filter(({ i }) => !!G.dt[`${vid}_${i}`]);

            function taskHtml({ t, i }) {
                const tid = `${vid}_${i}`;
                const isDone = !!G.dt[tid];
                const pc = t.priority?.toLowerCase() === 'high' ? 'p-high' : t.priority?.toLowerCase() === 'low' ? 'p-low' : 'p-medium';
                return `<div class="task ${isDone ? 'done' : ''}" onclick="${isDone ? 'void 0' : `completeTask('${tid}','${vid}')`}">
      <div class="task-row">
        <div class="task-circle">${isDone ? '✔' : ''}</div>
        <div class="task-name">${esc(t.task)}</div>
      </div>
      <div class="task-meta"><span class="priority-tag ${pc}">${t.priority || 'Normal'}</span></div>
      ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
    </div>`;
            }

            const titleStr = item.title;
            const titleEl = titleStr
                ? `<div class="vid-title">${esc(titleStr)}</div>`
                : `<div class="vid-title shimmer" id="vt-${vid}"></div>`;

            const po = accOpen[vid].pending;
            const dao = accOpen[vid].done;

            return `
  <div class="card ${done ? 'card-done' : ''}" style="animation-delay:${delay}s">
    <div class="thumb-wrap" onclick="playVideo(this,'${vid}')">
      <img src="https://img.youtube.com/vi/${vid}/hqdefault.jpg" loading="lazy" alt="thumb"/>
      <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      ${done ? `<div class="done-overlay-badge">✅ Completed</div>` : ''}
      <div class="thumb-progress"><div class="thumb-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card-body">
      ${titleEl}
      <div class="vid-meta">
        <span class="vid-dot"></span>
        <span class="vid-id">${vid}</span>
        ${done ? `<span class="all-done-chip">✅ All done</span>` : ''}
      </div>

      ${pendingTasks.length ? `
      <div class="acc-section">
        <div class="acc-hdr ${po ? '' : 'closed'}" id="ah-${vid}-pending" onclick="toggleAcc('${vid}','pending')">
          <div class="acc-dot acc-dot-pending"></div>
          <span class="acc-label">Pending</span>
          <span class="acc-count">${pendingTasks.length}</span>
          <span class="acc-arrow">▾</span>
        </div>
        <div class="acc-body ${po ? '' : 'closed'}" id="ab-${vid}-pending">
          ${pendingTasks.map(taskHtml).join('')}
        </div>
      </div>`: ''}

      ${doneTasks.length ? `
      <div class="acc-section">
        <div class="acc-hdr ${dao ? '' : 'closed'}" id="ah-${vid}-done" onclick="toggleAcc('${vid}','done')">
          <div class="acc-dot acc-dot-done"></div>
          <span class="acc-label" style="color:var(--accent3)">Completed</span>
          <span class="acc-count">${doneTasks.length}</span>
          <span class="acc-arrow">▾</span>
        </div>
        <div class="acc-body ${dao ? '' : 'closed'}" id="ab-${vid}-done">
          ${doneTasks.map(taskHtml).join('')}
        </div>
      </div>`: ''}

      <a class="watch-link" href="https://www.youtube.com/watch?v=${vid}" target="_blank">Watch on YouTube →</a>
    </div>
  </div>`;
        }

        function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        /* ══ SECTION HTML ═══════════════════════════════ */
        function buildSection(key, label, pillCls, items) {
            const open = secOpen[key];
            const cards = items.length === 0
                ? `<div class="empty-state"><div class="ei">${key === 'ip' ? '📋' : '🎉'}</div><p>${key === 'ip' ? 'All videos completed!' : 'No completed videos yet.'}</p></div>`
                : items.map((item, i) => buildCard(item, i * .055)).join('');
            return `
  <div class="section-header ${open ? '' : 'collapsed'}" id="sh-${key}" onclick="toggleSec('${key}')">
    <div class="sec-pill ${pillCls}"></div>
    <span class="sec-title">${label}</span>
    <span class="sec-count">${items.length} video${items.length !== 1 ? 's' : ''}</span>
    <span class="sec-chevron">▾</span>
  </div>
  <div class="section-body ${open ? '' : 'collapsed'}" id="sb-${key}">
    <div class="section-grid">${cards}</div>
  </div>`;
        }

        /* ══ RENDER ═════════════════════════════════════ */
        function render(query = '') {
            let data = allData;
            if (query) {
                data = allData.map(item => {
                    const tm = (item.title || '').toLowerCase().includes(query);
                    const vm = item.d.video_id.toLowerCase().includes(query);
                    const ft = (item.d.tasks || []).filter(t => t.task.toLowerCase().includes(query) || (t.description || '').toLowerCase().includes(query));
                    if (tm || vm) return item;
                    if (!ft.length) return null;
                    return { ...item, d: { ...item.d, tasks: ft } };
                }).filter(Boolean);
            }

            const ip = data.filter(i => !isVideoDone(i));
            const done = data.filter(i => isVideoDone(i));

            const wrap = document.getElementById('sectionWrap');
            wrap.innerHTML = `
    ${buildSection('ip', '🎯 In Progress', 'sec-pill-active', ip)}
    <div class="section-spacer"></div>
    ${buildSection('done', '✅ Completed Videos', 'sec-pill-done', done)}
  `;

            // fill titles async
            data.forEach(item => {
                if (!item.title) {
                    fetchTitle(item.d.video_id).then(t => {
                        item.title = t;
                        const el = document.getElementById(`vt-${item.d.video_id}`);
                        if (el) { el.classList.remove('shimmer'); el.textContent = t; }
                    });
                }
            });
        }

        /* ══ LOAD DATA ══════════════════════════════════ */
        async function loadTasks() {
            try {
                const files = await fetch('files.json').then(r => r.json());
                allData = await Promise.all(files.map(f => fetch(f).then(r => r.json()).then(d => ({ f, d, title: null }))));
            } catch {
                allData = [
                    {
                        f: 'd1', title: 'Never Gonna Give You Up – Rick Astley', d: {
                            video_id: 'dQw4w9WgXcQ', tasks: [
                                { task: 'Watch the full video', priority: 'High', description: 'Take notes as you watch.' },
                                { task: 'Summarize key points', priority: 'Medium', description: 'Write a 3-line summary.' },
                                { task: 'Share with a friend', priority: 'Low', description: 'Spread the knowledge.' },
                            ]
                        }
                    },
                    {
                        f: 'd2', title: null, d: {
                            video_id: '9bZkp7q19f0', tasks: [
                                { task: 'Analyze the rhythm', priority: 'High', description: 'Note time signature changes.' },
                                { task: 'Find the drop moment', priority: 'Medium', description: 'Mark the timestamp.' },
                            ]
                        }
                    },
                    {
                        f: 'd3', title: null, d: {
                            video_id: 'kJQP7kiw5Fk', tasks: [
                                { task: 'Transcribe the chorus', priority: 'High', description: 'Write it word-for-word.' },
                                { task: 'Identify the key', priority: 'Medium', description: 'Use a piano reference.' },
                                { task: 'Rate the video', priority: 'Low', description: 'Leave a comment.' },
                            ]
                        }
                    },
                ];
            }
            renderAch();
            render();
            updateHUD();
        }

        /* ══ SEARCH ═════════════════════════════════════ */
        document.getElementById('search').addEventListener('input', e => render(e.target.value.toLowerCase()));

        /* ══ SHOP ════════════════════════════════════════ */
        function openShop() { renderShop(); document.getElementById('shopModal').classList.add('open'); }
        function closeShop() { document.getElementById('shopModal').classList.remove('open'); }
        document.getElementById('shopModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeShop(); });

        function renderShop() {
            updateHUD();
            document.getElementById('themeGrid').innerHTML = THEMES.map(t => {
                const owned = G.ownedThemes.includes(t.id), active = G.activeTheme === t.id;
                return `<div class="theme-card ${active ? 'active' : ''}"
      style="background:linear-gradient(135deg,${t.colors[0]},${t.colors[1]}28)"
      onclick="handleTheme('${t.id}',${t.cost})">
      <div class="swatch"><span style="font-size:1.6rem">${t.emoji}</span><span>${t.label}</span></div>
      ${!owned ? `<span class="cost">💰${t.cost}</span>` : ''}
      ${owned ? `<span class="owned-badge">${active ? '✓ Active' : 'Owned'}</span>` : ''}
    </div>`;
            }).join('');
            document.getElementById('powerupList').innerHTML = POWERUPS.map(p => {
                const on = G.pw === p.id;
                return `<div class="powerup-item" onclick="buyPw('${p.id}',${p.cost},${p.dur})">
      <span class="powerup-icon">${p.emoji}</span>
      <div class="powerup-info">
        <div class="powerup-name">${p.label}${on ? ` <span style="color:var(--accent3);font-size:.72rem">(active·${G.pwLeft} left)</span>` : ''}</div>
        <div class="powerup-desc">${p.desc}</div>
      </div>
      <span class="powerup-cost">💰${p.cost}</span>
    </div>`;
            }).join('');
        }

        function handleTheme(id, cost) {
            if (G.ownedThemes.includes(id)) { applyTheme(id); }
            else {
                if (G.coins < cost) { toast('❌ Not enough coins!'); return; }
                G.coins -= cost; G.ownedThemes.push(id); applyTheme(id);
                toast(`🎨 ${THEMES.find(t => t.id === id).label} unlocked!`);
            }
            save(); updateHUD(); renderShop();
        }
        function applyTheme(id) { THEMES.forEach(t => document.body.classList.remove('theme-' + t.id)); document.body.classList.add('theme-' + id); G.activeTheme = id; }

        function buyPw(id, cost, dur) {
            if (G.coins < cost) { toast('❌ Not enough coins!'); return; }
            if (G.pw) { toast('❌ A power-up is already active!'); return; }
            G.coins -= cost; G.pw = id; G.pwLeft = dur;
            const p = POWERUPS.find(p => p.id === id);
            toast(`${p.emoji} ${p.label} activated!`);
            save(); updateHUD(); renderShop();
        }

        /* ══ TOAST / LEVEL UP ═══════════════════════════ */
        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.getElementById('toast-wrap').appendChild(t);
            setTimeout(() => t.remove(), 3400);
        }
        function showLvlUp() {
            const el = document.createElement('div');
            el.className = 'lvl-banner';
            el.innerHTML = `<div class="lvl-inner"><div class="stars">✨⭐✨</div><h2>LEVEL ${G.level}!</h2><p>+10 bonus coins · Keep grinding</p></div>`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2900);
        }

        /* ══ INIT ════════════════════════════════════════ */
        applyTheme(G.activeTheme || 'void');
        loadTasks();
    </script>
</body>

</html>
